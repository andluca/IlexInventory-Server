app = "ilex-inventory-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate_sql"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true

[[http_service.checks]]
  path = "/api/v1/health"
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"
