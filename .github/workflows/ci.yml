name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilex_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install uv && uv sync --frozen --extra dev

      - name: Write .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ilex_test
          DJANGO_SECRET_KEY=ci-test-secret
          EOF

      - name: Lint
        run: .venv/bin/ruff check backend/

      - name: No-ORM gate
        run: ./scripts/check_no_orm.sh

      - name: OpenAPI drift gate
        run: ./scripts/check_openapi_drift.sh

      - name: Tests
        run: .venv/bin/pytest

  docker-smoke:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write .env.prod
        run: |
          cat > .env.prod <<'EOF'
          DJANGO_SECRET_KEY=ci-smoke-secret
          DATABASE_URL=postgresql://ilex:ilex@postgres:5432/ilex_prod
          ALLOWED_HOSTS=localhost
          CORS_ALLOWED_ORIGINS=http://localhost
          OPENAPI_PUBLIC_DOCS=false
          SESSION_COOKIE_SECURE=false
          CSRF_COOKIE_SECURE=false
          POSTGRES_USER=ilex
          POSTGRES_PASSWORD=ilex
          POSTGRES_DB=ilex_prod
          EOF

      - name: Build and start stack
        run: docker compose -f deploy/docker-compose.prod.yml up --build -d

      - name: Smoke health
        run: ./scripts/smoke_health.sh

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.prod.yml down -v
